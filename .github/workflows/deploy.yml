name: Deploy to GitHub Pages

# Runs on every push to main, and can also be triggered manually
# from the Actions tab in GitHub.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Write access to push the built site to the gh-pages branch
permissions:
  contents: write

# Only allow one deployment at a time; don't cancel in-progress runs
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive  # required — PaperMod is a git submodule
          fetch-depth: 0         # full history so Hugo can use .GitInfo / lastmod

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true         # PaperMod requires Hugo extended

      - name: Build
        run: hugo --source site
        # Note: --minify is intentionally omitted.
        # hugo.toml sets minifyOutput = false because Hugo's minifier
        # breaks PaperMod's JSON-LD schema output.

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site/public
          publish_branch: gh-pages
