{{- end }}

{{- /* Sync PaperMod theme toggle with Giscus iframe */ -}}
<script>
(function() {
  var giscusScript = document.querySelector('script[data-giscus-dark-theme]');
  var lightTheme = giscusScript ? giscusScript.getAttribute('data-theme') : 'noborder_light';
  var darkTheme  = giscusScript ? giscusScript.getAttribute('data-giscus-dark-theme') : 'noborder_dark';

  function getTheme() {
    return document.documentElement.getAttribute('data-theme') === 'dark' ? darkTheme : lightTheme;
  }
  function setGiscusTheme(theme) {
    var iframe = document.querySelector('iframe.giscus-frame');
    if (iframe) {
      iframe.contentWindow.postMessage(
        { giscus: { setConfig: { theme: theme } } },
        'https://giscus.app'
      );
    }
  }
  // Set initial theme once Giscus loads
  window.addEventListener('message', function(e) {
    if (e.origin === 'https://giscus.app') {
      setGiscusTheme(getTheme());
    }
  });
  // Watch for PaperMod theme toggle changes
  var observer = new MutationObserver(function() {
    setGiscusTheme(getTheme());
  });
  observer.observe(document.documentElement, { attributes: true, attributeFilter: ['data-theme'] });
})();
</script>
